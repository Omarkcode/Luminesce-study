<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="Luminesce Study Space.png" />
  <link rel="apple-touch-icon" href="Luminesce Study Space.png" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#06091a" />
  <meta name="msapplication-TileImage" content="Luminesce Study Space.png" />
  <meta name="msapplication-TileColor" content="#06091a" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Luminesce — Admin</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;700&display=swap"
    rel="stylesheet"
  />

  <script src="theme.js"></script>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body>

  <canvas id="skyCanvas"></canvas>
  <canvas id="cityCanvas"></canvas>
  <div class="moon" aria-hidden="true"></div>

  <div class="adm-page" id="admPage" style="opacity:0">

    <header class="adm-header">
      <button class="adm-back" id="btnBack">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"
             width="13" height="13">
          <line x1="19" y1="12" x2="5" y2="12"/>
          <polyline points="12 19 5 12 12 5"/>
        </svg>
        Menu
      </button>
      <h1 class="adm-title">Feedback Admin</h1>
      <div class="adm-header-right"></div>
    </header>

    <div class="adm-body">

      <!-- Thread list -->
      <aside class="adm-sidebar" id="admSidebar">
        <div class="adm-sidebar-hdr">Users</div>
        <div class="adm-thread-list" id="admThreadList"></div>
      </aside>

      <!-- Conversation -->
      <main class="adm-convo" id="admConvo">
        <div class="adm-convo-empty">Select a user to view their feedback.</div>
      </main>

    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="background.js"></script>
  <script src="admin.js"></script>
</body>
</html>
