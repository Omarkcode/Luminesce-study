<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="Luminesce Study Space.png" />
  <link rel="apple-touch-icon" href="Luminesce Study Space.png" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#06091a" />
  <meta name="msapplication-TileImage" content="Luminesce Study Space.png" />
  <meta name="msapplication-TileColor" content="#06091a" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Luminesce Study</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;700&family=Noto+Naskh+Arabic:wght@400;600&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Sky canvas -->
  <canvas id="skyCanvas"></canvas>

  <!-- City canvas -->
  <canvas id="cityCanvas"></canvas>

  <!-- Moon -->
  <div class="moon" aria-hidden="true"></div>

  <!-- Pen nib (kept hidden, reserved for future use) -->
  <div class="pen-nib" id="penNib" aria-hidden="true"></div>

  <!-- Animated title -->
  <div class="title-wrap" id="titleWrap">
    <h1 class="title" id="mainTitle"></h1>
  </div>

  <!-- Study button — opens login / sign-up modal -->
  <button class="study-btn" type="button">Study</button>

  <!-- ══ Auth Modal ══════════════════════════════════════════ -->
  <div class="auth-overlay" id="authOverlay" aria-modal="true" role="dialog">
    <div class="auth-card">

      <button class="auth-close" id="authClose" aria-label="Close">✕</button>
      <h2 class="auth-brand">Luminesce Student</h2>

      <div class="auth-tabs">
        <button class="auth-tab active" id="tabSignup">Create Account</button>
        <button class="auth-tab"        id="tabLogin">Sign In</button>
      </div>

      <!-- Sign-up form -->
      <form class="auth-form" id="signupForm" novalidate>
        <input class="auth-input" type="text"     id="signupUsername" placeholder="Username"
               autocomplete="username" required />
        <input class="auth-input" type="email"    id="signupEmail"    placeholder="Email"
               autocomplete="email" required />
        <input class="auth-input" type="password" id="signupPassword" placeholder="Password"
               autocomplete="new-password" required />
        <div class="auth-error" id="signupError"></div>
        <button class="auth-submit" type="submit">Create Account</button>
        <p class="auth-switch">
          Already have an account?
          <button type="button" class="auth-link" id="toLogin">Sign in</button>
        </p>
      </form>

      <!-- Sign-in form -->
      <form class="auth-form auth-form--hidden" id="loginForm" novalidate>
        <input class="auth-input" type="email"    id="loginEmail"    placeholder="Email"
               autocomplete="email" required />
        <input class="auth-input" type="password" id="loginPassword" placeholder="Password"
               autocomplete="current-password" required />
        <div class="auth-error" id="loginError"></div>
        <button class="auth-submit" type="submit">Sign In</button>
        <p class="auth-switch">
          Don't have an account?
          <button type="button" class="auth-link" id="toSignup">Create one</button>
        </p>
      </form>

    </div>
  </div>
  <!-- ══ End Auth Modal ══════════════════════════════════════ -->

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="background.js"></script>
  <script src="script.js"></script>
</body>
</html>
