<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Luminesce Study — Menu</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;700&display=swap"
    rel="stylesheet"
  />

  <script src="theme.js"></script>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="menu.css" />
  <link rel="stylesheet" href="hint.css" />
</head>
<body>

  <!-- Shared starry background -->
  <canvas id="skyCanvas"></canvas>
  <canvas id="cityCanvas"></canvas>
  <div class="moon" aria-hidden="true"></div>

  <!-- Full-screen blur layer sits above canvases + moon -->
  <div class="bg-blur" aria-hidden="true"></div>

  <!-- ══ Menu Panel ══════════════════════════════════════════ -->
  <span class="menu-version">ver. 0.9.7</span>

  <div class="menu-panel" id="menuPanel" style="opacity:0">

    <div class="panel-header">
      <h1 class="panel-title">Study Menu</h1>
      <p class="panel-greeting" id="menuGreeting"></p>
    </div>

    <div class="menu-grid">

      <!-- Classic -->
      <button class="grid-card" data-mode="classic" tabindex="0"
              data-hint="A distraction-free study space with a timer, task list, music, notes, and deadline tracker.">
        <div class="grid-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"
               stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="8" y="2" width="8" height="4" rx="1"/>
            <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
            <line x1="9"  y1="12" x2="15" y2="12"/>
            <line x1="9"  y1="16" x2="15" y2="16"/>
            <line x1="9"  y1="8"  x2="15" y2="8"/>
          </svg>
        </div>
        <span class="grid-label">Classic</span>
      </button>

      <!-- Pomodoro -->
      <button class="grid-card" data-mode="pomodoro" tabindex="0"
              data-hint="Study in focused intervals using the Pomodoro technique. Track your sessions with a Tomato Jar.">
        <div class="grid-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"
               stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <!-- stem -->
            <path d="M12 7 C12 5 10.5 3.5 9 2"/>
            <!-- leaf left -->
            <path d="M12 7 C10 5 7 6 7 9"/>
            <!-- leaf right -->
            <path d="M12 7 C14 5 17 6 17 9"/>
            <!-- tomato body -->
            <circle cx="12" cy="16" r="7"/>
          </svg>
        </div>
        <span class="grid-label">Pomodoro</span>
      </button>

      <!-- Flight -->
      <button class="grid-card grid-card--coming-soon" aria-disabled="true" tabindex="-1">
        <div class="grid-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
               stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <!-- fuselage body -->
            <path d="M2 12 Q7 8 14 8.5 L21 11 L21 13 L14 15.5 Q7 16 2 12Z"/>
            <!-- main swept wing -->
            <path d="M10 10 L6 18 L15 14"/>
            <!-- tail vertical fin -->
            <path d="M3.5 11.5 L2.5 8 L4.5 10.5"/>
            <!-- tail horizontal fin -->
            <path d="M3.5 12.5 L2.5 16 L4.5 13.5"/>
          </svg>
        </div>
        <span class="grid-label">Flight</span>
      </button>

      <!-- Study Buddy -->
      <button class="grid-card" data-mode="study-buddy" tabindex="0"
              data-hint="Chat with an AI that explains topics, makes flashcards, and quizzes you on anything.">
        <div class="grid-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"
               stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <!-- Claude logo approximation: rounded diamond with inner mark -->
            <path d="M12 2 Q17.5 5 21.5 12 Q17.5 19 12 22 Q6.5 19 2.5 12 Q6.5 5 12 2 Z"/>
            <circle cx="12" cy="12" r="2.8"/>
          </svg>
        </div>
        <span class="grid-label">Study Buddy</span>
      </button>

      <!-- Library -->
      <button class="grid-card" data-mode="library" tabindex="0"
              data-hint="View and organise all your saved knowledge panels into named shelves.">
        <div class="grid-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"
               stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <!-- shelf base -->
            <line x1="2" y1="20" x2="22" y2="20"/>
            <!-- book 1 tall -->
            <rect x="3" y="8" width="4" height="12" rx="0.5"/>
            <!-- book 2 short -->
            <rect x="8.5" y="12" width="3" height="8" rx="0.5"/>
            <!-- book 3 tallest -->
            <rect x="13" y="6" width="4.5" height="14" rx="0.5"/>
            <!-- book 4 medium -->
            <rect x="18.5" y="10" width="2.5" height="10" rx="0.5"/>
          </svg>
        </div>
        <span class="grid-label">Library</span>
      </button>

      <!-- Feedback -->
      <button class="grid-card" data-mode="feedback" tabindex="0"
              data-hint="Found a bug or have a suggestion? Send feedback directly to the developer.">
        <div class="grid-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"
               stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M12 20h9"/>
            <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
          </svg>
        </div>
        <span class="grid-label">Feedback</span>
      </button>

      <!-- Groups -->
      <button class="grid-card" data-mode="groups" tabindex="0"
              data-hint="Study with friends — share knowledge panels, quiz each other, and collaborate in a shared group.">
        <div class="grid-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"
               stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <!-- left person head + body -->
            <circle cx="8" cy="7" r="3"/>
            <path d="M1 21v-2a4 4 0 0 1 4-4h6a4 4 0 0 1 4 4v2"/>
            <!-- right person (partial, overlapping) -->
            <circle cx="17" cy="7" r="3"/>
            <path d="M19 21v-2a4 4 0 0 0-3-3.85"/>
          </svg>
        </div>
        <span class="grid-label">Groups</span>
      </button>

      <!-- Settings -->
      <button class="grid-card" data-mode="settings" tabindex="0"
              data-hint="Manage your account, switch to day mode, control chimes, and clear study data.">
        <div class="grid-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"
               stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06
                     a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09
                     A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83
                     l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09
                     A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83
                     l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09
                     a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83
                     l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09
                     a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </div>
        <span class="grid-label">Settings</span>
      </button>

    </div><!-- /.menu-grid -->
  </div><!-- /.menu-panel -->

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="background.js"></script>
  <script src="menu.js"></script>
  <script src="hint.js"></script>
</body>
</html>
