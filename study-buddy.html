<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Luminesce Study — Study Buddy</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;700&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="classic.css" />
  <link rel="stylesheet" href="knowledge.css" />
  <link rel="stylesheet" href="study-buddy.css" />
</head>
<body>

  <!-- Starry background -->
  <canvas id="skyCanvas"></canvas>
  <canvas id="cityCanvas"></canvas>
  <div class="moon" aria-hidden="true"></div>

  <!-- Warm lamp glow overlay -->
  <div class="room-glow" aria-hidden="true"></div>

  <!-- ══ Sidebar ══════════════════════════════════════════════ -->
  <nav class="sidebar" id="sidebarSb" aria-label="Study Buddy tools">

    <div class="sb-top">
      <!-- Knowledge Finder -->
      <button class="sb-btn" id="btnKF" title="Knowledge Finder" aria-label="Knowledge Finder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
          <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
        </svg>
      </button>
    </div>

    <!-- Exit -->
    <button class="sb-btn sb-exit" id="btnExit" title="Back to Menu" aria-label="Back to Menu">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"/>
        <polyline points="12 19 5 12 12 5"/>
      </svg>
    </button>

  </nav>

  <!-- ══ Knowledge Finder Panel ════════════════════════════════ -->
  <div class="kf-panel" id="kfPanel" hidden>
    <div class="kf-header">📚 Knowledge Finder</div>
    <div class="kf-list" id="kfList"></div>
  </div>

  <!-- ══ Main Chat Area ════════════════════════════════════════ -->
  <main class="sb-main">
    <div class="sb-chat-wrap">

      <!-- Chat header -->
      <div class="sb-chat-header">
        <div class="sb-buddy-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2 Q17.5 5 21.5 12 Q17.5 19 12 22 Q6.5 19 2.5 12 Q6.5 5 12 2 Z"/>
            <circle cx="12" cy="12" r="2.8"/>
          </svg>
        </div>
        <div>
          <div class="sb-chat-title">Study Buddy</div>
          <div class="sb-chat-subtitle">Ask me to explain anything, make flashcards, or quiz you</div>
        </div>
      </div>

      <!-- Messages -->
      <div class="sb-messages" id="sbMessages"></div>

      <!-- Input bar -->
      <div class="sb-input-bar">
        <textarea
          class="sb-input"
          id="sbInput"
          placeholder="Ask Study Buddy anything… (Shift+Enter for new line)"
          rows="1"
          autocomplete="off"
        ></textarea>
        <button class="sb-send" id="sbSend" aria-label="Send message">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>

    </div><!-- /.sb-chat-wrap -->
  </main><!-- /.sb-main -->

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="config.js"></script>
  <script src="background.js"></script>
  <script src="knowledge.js"></script>
  <script src="study-buddy.js"></script>
</body>
</html>
