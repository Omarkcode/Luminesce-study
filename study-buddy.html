<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="Luminesce Study Space.png" />
  <link rel="apple-touch-icon" href="Luminesce Study Space.png" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#06091a" />
  <meta name="msapplication-TileImage" content="Luminesce Study Space.png" />
  <meta name="msapplication-TileColor" content="#06091a" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Luminesce Study — Study Buddy</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;700&display=swap"
    rel="stylesheet"
  />

  <script src="theme.js"></script>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="classic.css" />
  <link rel="stylesheet" href="knowledge.css" />
  <link rel="stylesheet" href="study-buddy.css" />
  <link rel="stylesheet" href="hint.css" />
</head>
<body>

  <!-- Starry background -->
  <canvas id="skyCanvas"></canvas>
  <canvas id="cityCanvas"></canvas>
  <div class="moon" aria-hidden="true"></div>

  <!-- Warm lamp glow overlay -->
  <div class="room-glow" aria-hidden="true"></div>

  <!-- ══ Sidebar ══════════════════════════════════════════════ -->
  <nav class="sidebar" id="sidebarSb" aria-label="Study Buddy tools">

    <div class="sb-top">
      <!-- Knowledge Finder -->
      <button class="sb-btn" id="btnKF" title="Knowledge Finder" aria-label="Knowledge Finder"
              data-hint="Your saved flashcard sets and quizzes, organised by shelf. Drag a panel into the chat to edit it with AI.">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
          <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
        </svg>
      </button>

      <!-- Usage -->
      <button class="sb-btn" id="btnUsage" title="API Usage" aria-label="API Usage"
              data-hint="See how many messages and tokens you've used today. Resets at midnight.">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="20" x2="18" y2="10"/>
          <line x1="12" y1="20" x2="12" y2="4"/>
          <line x1="6"  y1="20" x2="6"  y2="14"/>
          <line x1="3"  y1="20" x2="21" y2="20"/>
        </svg>
      </button>
    </div>

    <!-- Exit -->
    <button class="sb-btn sb-exit" id="btnExit" title="Back to Menu" aria-label="Back to Menu"
            data-hint="Return to the main menu.">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"/>
        <polyline points="12 19 5 12 12 5"/>
      </svg>
    </button>

  </nav>

  <!-- ══ Knowledge Finder Panel ════════════════════════════════ -->
  <div class="kf-panel" id="kfPanel" hidden>
    <div class="kf-header">📚 Knowledge Finder</div>
    <div class="kf-list" id="kfList"></div>
  </div>

  <!-- ══ Usage Panel ═══════════════════════════════════════════ -->
  <div class="sb-usage-panel" id="usagePanel" hidden>
    <div class="sb-usage-header">
      <span>📊 Usage Today</span>
      <span class="sb-usage-resets" id="usageResets">—</span>
    </div>

    <div class="sb-usage-row">
      <div class="sb-usage-label">
        <span>Messages</span>
        <span class="sb-usage-val" id="usageMsgCount">0</span>
      </div>
      <div class="sb-usage-bar-wrap">
        <div class="sb-usage-bar-fill" id="usageMsgBar" style="width:0%"></div>
      </div>
      <div class="sb-usage-limit">/ 6,000</div>
    </div>

    <div class="sb-usage-row">
      <div class="sb-usage-label">
        <span>Tokens (approx)</span>
        <span class="sb-usage-val" id="usageTokCount">0</span>
      </div>
      <div class="sb-usage-bar-wrap">
        <div class="sb-usage-bar-fill sb-usage-bar-fill--tok" id="usageTokBar" style="width:0%"></div>
      </div>
      <div class="sb-usage-limit">/ 500K</div>
    </div>

    <div class="sb-usage-note">Groq free tier · llama-3.3-70b / llama-4-scout</div>
  </div>

  <!-- ══ Main Chat Area ════════════════════════════════════════ -->
  <main class="sb-main">
    <div class="sb-chat-wrap">

      <!-- Chat header -->
      <div class="sb-chat-header">
        <div class="sb-buddy-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2 Q17.5 5 21.5 12 Q17.5 19 12 22 Q6.5 19 2.5 12 Q6.5 5 12 2 Z"/>
            <circle cx="12" cy="12" r="2.8"/>
          </svg>
        </div>
        <div>
          <div class="sb-chat-title">Study Buddy</div>
          <div class="sb-chat-subtitle">Ask me to explain anything, make flashcards, or quiz you</div>
        </div>
      </div>

      <!-- Messages -->
      <div class="sb-messages" id="sbMessages"></div>

      <!-- Edit chip — shown when a panel is dragged in for editing -->
      <div class="sb-edit-chip" id="sbEditChip" hidden>
        <span class="sb-edit-chip-label">Editing:</span>
        <span class="sb-edit-chip-name" id="sbEditChipName"></span>
        <button class="sb-edit-chip-close" id="sbEditChipClose" aria-label="Cancel edit">✕</button>
      </div>

      <!-- File chip — shown when a file is attached -->
      <div class="sb-file-chip" id="sbFileChip" hidden>
        <span>📎</span>
        <span class="sb-file-chip-name" id="sbFileChipName"></span>
        <button class="sb-edit-chip-close" id="sbFileChipClose" aria-label="Remove file">✕</button>
      </div>

      <!-- Input bar -->
      <div class="sb-input-bar" id="sbInputBar">
        <input type="file" id="sbFileInput" accept="image/*,.txt,.md,.csv,.json" hidden>
        <button class="sb-attach" id="sbAttach" aria-label="Attach file" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
          </svg>
        </button>
        <textarea
          class="sb-input"
          id="sbInput"
          placeholder="Ask Study Buddy anything… (Shift+Enter for new line)"
          rows="1"
          autocomplete="off"
        ></textarea>
        <button class="sb-send" id="sbSend" aria-label="Send message">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>

    </div><!-- /.sb-chat-wrap -->
  </main><!-- /.sb-main -->

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="config.js"></script>
  <script src="background.js"></script>
  <script src="knowledge.js"></script>
  <script src="study-buddy.js"></script>
  <script src="hint.js"></script>
</body>
</html>
